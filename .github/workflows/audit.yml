name: pip-audit

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/audit.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pip-audit:
    name: Dependency CVE scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Run pip-audit
        run: |
          # CVE-2026-3219 affects pip 26.x; no fix version available yet — re-evaluate when a patched pip ships
          uv run pip-audit --ignore-vuln CVE-2026-3219
