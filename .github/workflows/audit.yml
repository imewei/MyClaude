name: pip-audit

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/audit.yml'
  workflow_dispatch:

jobs:
  pip-audit:
    name: Dependency CVE scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Run pip-audit
        run: |
          uv run pip-audit
