name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Run tests
        run: uv run pytest tools/tests/ -v --tb=short

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Ruff check
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy --ignore-missing-imports tools/ plugins/

  validate:
    name: Plugin Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv sync
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Validate plugin metadata
        run: |
          python3 tools/validation/metadata_validator.py plugins/agent-core
          python3 tools/validation/metadata_validator.py plugins/dev-suite
          python3 tools/validation/metadata_validator.py plugins/science-suite

      - name: Check skill context budget
        run: python3 tools/validation/context_budget_checker.py
